name: Test Package Compatibility Python/OS

on:
  push:
    branches:
      - main
    paths:
      - 'sdk*_default.txt'
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    # Allow manual triggering

jobs:
  test-installation:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11', '3.12', '3.13']
    
    name: ${{ matrix.os }} Python ${{ matrix.python-version }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install uv (Unix)
        if: runner.os != 'Windows'
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      
      - name: Install uv (Windows)
        if: runner.os == 'Windows'
        run: irm https://astral.sh/uv/install.ps1 | iex
        shell: powershell
      
      - name: Create virtual environment
        run: uv venv --python ${{ matrix.python-version }}
      
      - name: Install packages (Unix)
        if: runner.os != 'Windows'
        run: |
          source .venv/bin/activate
          DEFAULT_SDK_FILE=$(ls sdk*_default.txt 2>/dev/null | head -n1)
          if [ -z "$DEFAULT_SDK_FILE" ]; then
            echo "No default SDK file found (sdk*_default.txt)"
            exit 1
          fi
          echo "Using SDK file: $DEFAULT_SDK_FILE"
          uv pip install -r "$DEFAULT_SDK_FILE"
          uv pip list
      
      - name: Install packages (Windows)
        if: runner.os == 'Windows'
        run: |
          $ErrorActionPreference = "Stop"
          uv venv --python ${{ matrix.python-version }}
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          .venv\Scripts\activate
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $DefaultSdkFile = Get-ChildItem -Name "sdk*_default.txt" | Select-Object -First 1
          if (-not $DefaultSdkFile) {
            Write-Error "No default SDK file found (sdk*_default.txt)"
            exit 1
          }
          Write-Output "Using SDK file: $DefaultSdkFile"
          uv pip install -r $DefaultSdkFile
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          uv pip list
        shell: powershell
