name: Test Package Compatibility Python/OS

on:
  push:
    branches:
      - main
    paths:
      - 'advertised_sdk.txt'
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    # Allow manual triggering

jobs:
  test-installation:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11', '3.12', '3.13']

    name: ${{ matrix.os }} Python ${{ matrix.python-version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install uv (Unix)
        if: runner.os != 'Windows'
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install uv (Windows)
        if: runner.os == 'Windows'
        run: irm https://astral.sh/uv/install.ps1 | iex
        shell: powershell

      - name: Create virtual environment
        run: uv venv --python ${{ matrix.python-version }}

      - name: Add venv to PATH
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            echo "$GITHUB_WORKSPACE/.venv/Scripts" >> $GITHUB_PATH
          else
            echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH
          fi
          echo "VIRTUAL_ENV=$GITHUB_WORKSPACE/.venv" >> $GITHUB_ENV
        shell: bash

      - name: Install packages (Unix)
        if: runner.os != 'Windows'
        run: |
          DEFAULT_SDK_FILE=$(grep ',default' advertised_sdk.txt | cut -d',' -f1)
          if [ -z "$DEFAULT_SDK_FILE" ]; then
            echo "No default SDK file found in advertised_sdk.txt"
            exit 1
          fi
          echo "Using SDK file: $DEFAULT_SDK_FILE"
          uv pip install -r "$DEFAULT_SDK_FILE"
          uv pip list

      - name: Install packages (Windows)
        if: runner.os == 'Windows'
        run: |
          $ErrorActionPreference = "Stop"
          $DefaultSdkFile = (Select-String -Path "advertised_sdk.txt" -Pattern ",default" | ForEach-Object { $_.Line.Split(',')[0] } | Select-Object -First 1)
          if (-not $DefaultSdkFile) {
            Write-Error "No default SDK file found in advertised_sdk.txt"
            exit 1
          }
          Write-Output "Using SDK file: $DefaultSdkFile"
          uv pip install -r $DefaultSdkFile
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          uv pip list
        shell: powershell
